name: Deploy web build to GitHub Pages

# Build the wasm/egui web app with trunk and publish it to GitHub Pages on every
# push to main. The site lives at https://cathbad1962.github.io/chip8-emulator/,
# so the build uses that repo subpath as the public URL.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel superseded in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install trunk
        run: |
          curl -sSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xzf -
          sudo mv trunk /usr/local/bin/

      - name: Build (release, Pages subpath)
        working-directory: chip8-app
        run: trunk build --release --public-url /chip8-emulator/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: chip8-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
