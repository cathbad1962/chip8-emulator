<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>CHIP-8</title>
    <style>
        /* eframe sizes the canvas's drawing buffer to fill its container each
           frame, so the container (html/body) must actually span the viewport —
           otherwise the canvas collapses to a small default size. This is the
           eframe_template's fullscreen recipe: 100% html/body + an absolutely
           positioned, centred canvas. */
        html, body {
            overflow: hidden;
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            width: 100%;
            background: #0b0b0b;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            /* Explicit size: without this the canvas falls back to the HTML
               default of 300x150 and the app renders tiny. eframe reads this
               box and sizes its drawing buffer to match. */
            width: 100%;
            height: 100%;
        }
    </style>

    <!-- This line is the whole Trunk integration: it builds the Rust crate in
         this directory to wasm, runs wasm-bindgen, and injects the JS loader.
         data-wasm-opt="2" runs wasm-opt to shrink the binary in release. -->
    <link data-trunk rel="rust" data-wasm-opt="2" />
</head>
<body>
    <!-- id MUST match the string in main.rs (`the_canvas_id`). -->
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
